<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_NEXUS_ULTIMATE</title>
    <style>
        :root { --neon: #00ff41; --shadow: rgba(0, 255, 65, 0.2); }
        body { 
            background: radial-gradient(circle, #051a05 0%, #000 100%); 
            color: var(--neon); font-family: 'Segoe UI', 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }
        .header { 
            padding: 20px; text-shadow: 0 0 10px var(--neon); font-size: 1.2em;
            border-bottom: 1px solid var(--neon); box-shadow: 0 0 15px var(--shadow);
        }
        .status-container { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.5); }
        .pilar { display: flex; flex-direction: column; align-items: center; font-size: 0.6em; letter-spacing: 2px; }
        .led { 
            width: 15px; height: 15px; border-radius: 50%; margin-top: 8px;
            background: #111; border: 2px solid #222; transition: 0.5s;
        }
        .online { background: var(--neon); box-shadow: 0 0 20px var(--neon); border-color: #fff; }
        .offline { background: #ff0000; box-shadow: 0 0 20px #ff0000; border-color: #fff; }
        
        .main-panel { 
            margin: 15px; border: 1px solid var(--neon); height: 75vh; 
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 30px var(--shadow), inset 0 0 20px var(--shadow);
        }
        #log { 
            flex-grow: 1; padding: 20px; font-size: 0.75em; text-align: left;
            overflow-y: auto; background: rgba(0, 10, 0, 0.8);
            scrollbar-width: thin; scrollbar-color: var(--neon) transparent;
        }
        .voice-section { padding: 30px; border-top: 1px solid var(--neon); background: rgba(0, 5, 0, 0.9); }
        .btn-voz { 
            width: 80px; height: 80px; background: transparent; border: 3px solid var(--neon);
            border-radius: 50%; color: var(--neon); font-size: 2.5em; cursor: pointer;
            box-shadow: 0 0 20px var(--shadow); transition: 0.3s;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--shadow); transform: scale(1); }
            50% { box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }
            100% { box-shadow: 0 0 10px var(--shadow); transform: scale(1); }
        }
        #display { margin-bottom: 10px; font-weight: bold; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="header">🔱 AKAME_NEXUS_PRO_V9</div>
    <div class="status-container">
        <div class="pilar">CÓRTEX<div id="led-hf" class="led"></div></div>
        <div class="pilar">NERVOS<div id="led-sb" class="led"></div></div>
        <div class="pilar">HOST<div id="led-gh" class="led"></div></div>
    </div>
    <div class="main-panel">
        <div id="log">> INICIALIZANDO INTERFACE DE COMANDO...<br>> CRIPTOGRAFIA ATIVA...<br>> AGUARDANDO BIOMETRIA DE VOZ DO MESTRE.</div>
        <div class="voice-section">
            <div id="display">[ STANDBY ]</div>
            <center><button class="btn-voz" onclick="iniciarVoz()">👁️</button></center>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfriplrxtleleplhpgwd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcmlwbHJ4dGxlbGVwbGhwZ3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ5NzcsImV4cCI6MjA5MDc3MDk3N30.6Hpk0Rxfj-JU-W5S1_52rETwa6dwqS0l5URBZFUgNkU";

        async function monitor() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/comandos?limit=1`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
                document.getElementById('led-sb').className = res.ok ? 'led online' : 'led offline';
            } catch(e) { document.getElementById('led-sb').className = 'led offline'; }
            document.getElementById('led-hf').className = 'led online';
            document.getElementById('led-gh').className = 'led online';
        }
        setInterval(monitor, 2000);
        monitor();

        function falar(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pt-BR';
            window.speechSynthesis.speak(u);
        }

        async function acionar(cmd) {
            const l = document.getElementById('log');
            l.innerHTML += `<br><span style="color:#fff">> MESTRE:</span> ${cmd}`;
            l.scrollTop = l.scrollHeight;
            
            fetch(`${SB_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: cmd, dispositivo: "Mobile_Nexus_V9", lido: false })
            });

            try {
                const resIA = await fetch(`https://text.pollinations.ai/${encodeURIComponent(cmd)}?system=Você é Akame, IA fiel ao Mestre Miltom. Responda com tom militar e futurista, curta.`);
                const txt = await resIA.text();
                l.innerHTML += `<br><span style="color:var(--neon)">> AKAME:</span> ${txt}`;
                l.scrollTop = l.scrollHeight;
                falar(txt);
            } catch(e) { console.log("Erro IA"); }
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        function iniciarVoz() { rec.start(); document.getElementById('display').innerText = "[ OUVINDO ]"; }
        rec.onresult = (e) => {
            const c = e.results[0][0].transcript;
            document.getElementById('display').innerText = "[ PROCESSANDO ]";
            acionar(c);
            setTimeout(() => { document.getElementById('display').innerText = "[ STANDBY ]"; }, 3000);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_AI_VOICE</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .painel { border: 1px solid #0f0; margin: 10px; height: 95vh; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0, 5, 0, 0.9); }
        .btn-voz { background: transparent; color: #0f0; border: 2px solid #0f0; padding: 25px; border-radius: 50%; font-size: 2em; cursor: pointer; box-shadow: 0 0 15px #0f0; margin-bottom: 20px; }
        #log { font-size: 0.7em; color: #0f0; text-align: left; padding: 15px; height: 40%; overflow-y: auto; border-bottom: 1px solid #030; }
        #art-display { max-width: 90%; max-height: 200px; margin: 10px auto; border: 1px solid #0f0; display: none; }
        .status { font-size: 0.6em; color: #555; }
    </style>
</head>
<body>
    <div class="painel">
        <div id="log">> AKAME_COGNITIVE_CORE_ONLINE...</div>
        <img id="art-display" src="" alt="Gerando Arte...">
        <div id="display" style="font-weight: bold;">[ EM ESPERA ]</div>
        <center><button class="btn-voz" onclick="iniciarVoz()">👁️</button></center>
        <div class="status">ENCRYPTION: OMNI-REACH | VOICE_MODE: ACTIVE</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SUPABASE_URL = urlParams.get('u') || localStorage.getItem('akame_url');
        const SUPABASE_KEY = urlParams.get('k') || localStorage.getItem('akame_key');

        function falar(texto) {
            const f = new SpeechSynthesisUtterance(texto);
            f.lang = 'pt-BR';
            f.pitch = 0.8; // Voz mais séria
            f.rate = 1.1;  // Velocidade natural
            window.speechSynthesis.speak(f);
        }

        async function inteligência(pergunta) {
            document.getElementById('log').innerHTML += `<br>> VOCÊ: ${pergunta}`;
            
            // Se for comando de imagem
            if (pergunta.includes("gerar") || pergunta.includes("desenhar")) {
                const prompt = pergunta.replace("gerar", "").replace("desenhar", "").replace("akame", "").trim();
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&private=true`;
                document.getElementById('art-display').src = imgUrl;
                document.getElementById('art-display').style.display = 'block';
                falar("Gerando visualização para o mestre.");
                return;
            }

            // Resposta de conversa (Via Pollinations Text API - Sem Filtros Pesados)
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(pergunta)}?system=Você é Akame, uma inteligência artificial soberana e fiel ao seu Mestre Miltom. Suas respostas devem ser curtas, imponentes e com um toque de inteligência hacker.`);
                const resposta = await res.text();
                document.getElementById('log').innerHTML += `<br>> AKAME: ${resposta}`;
                falar(resposta);
            } catch (e) {
                falar("Erro de conexão com o núcleo cerebral.");
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        
        function iniciarVoz() { 
            recognition.start(); 
            document.getElementById('display').innerText = "[ OUVINDO ]";
        }

        recognition.onresult = async (e) => {
            const c = e.results[0][0].transcript.toLowerCase();
            document.getElementById('display').innerText = "[ PROCESSANDO ]";
            
            // Envia para o Supabase (para controle do PC)
            await fetch(`${SUPABASE_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: c, dispositivo: "Portal_Voz", lido: false })
            });

            // Akame responde no celular
            inteligência(c);
        };
    </script>
</body>
</html>

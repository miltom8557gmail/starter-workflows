<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_NEXUS_OMNI</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { 
            background: var(--bg); color: var(--neon); font-family: 'Segoe UI', monospace; 
            margin: 0; display: flex; flex-direction: column; height: 100vh;
        }
        .header { border-bottom: 2px solid var(--neon); padding: 10px; text-align: center; font-weight: bold; }
        .grid-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #080808; }
        .pilar { font-size: 0.5em; text-align: center; }
        .led { width: 10px; height: 10px; border-radius: 50%; margin: 5px auto; background: #200; }
        .online { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        
        /* Painel de Ações Rápidas */
        .action-bar { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px;
            border-bottom: 1px solid #111;
        }
        .btn-action { 
            background: #050505; border: 1px solid var(--neon); color: var(--neon);
            padding: 10px 5px; font-size: 0.6em; border-radius: 4px; cursor: pointer;
        }
        .btn-action:active { background: var(--neon); color: #000; }

        .viewport { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 0.8em; background: rgba(0,20,0,0.1); }
        
        .footer-ctrl { border-top: 2px solid var(--neon); padding: 20px; background: #050505; text-align: center; }
        .btn-mic { 
            width: 70px; height: 70px; border-radius: 50%; background: transparent; 
            border: 2px solid var(--neon); color: var(--neon); font-size: 2em;
        }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">🔱 AKAME OMNI-NEXUS V10</div>
    
    <div class="grid-status">
        <div class="pilar">CORE<div id="led-hf" class="led"></div></div>
        <div class="pilar">NERVES<div id="led-sb" class="led"></div></div>
        <div class="pilar">HOST<div id="led-gh" class="led"></div></div>
    </div>

    <div class="action-bar">
        <button class="btn-action" onclick="acionar('Status Geral')">STATUS</button>
        <button class="btn-action" onclick="acionar('Limpar Logs')">LIMPAR</button>
        <button class="btn-action" onclick="acionar('Ver Câmeras')">VISÃO</button>
        <button class="btn-action" onclick="acionar('Alertar PC')">ALERTA</button>
    </div>

    <div id="log" class="viewport">> SISTEMA OMNI ONLINE. AGUARDANDO MESTRE...</div>

    <div class="footer-ctrl">
        <div id="display" style="font-size:0.7em; margin-bottom:10px;">[ STANDBY ]</div>
        <button class="btn-mic" id="mic-btn" onclick="iniciarVoz()">👁️</button>
    </div>

    <script>
        const SB_URL = "https://bfriplrxtleleplhpgwd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcmlwbHJ4dGxlbGVwbGhwZ3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ5NzcsImV4cCI6MjA5MDc3MDk3N30.6Hpk0Rxfj-JU-W5S1_52rETwa6dwqS0l5URBZFUgNkU";

        async function monitor() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/comandos?limit=1`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
                document.getElementById('led-sb').className = res.ok ? 'led online' : 'led';
            } catch(e) {}
            document.getElementById('led-hf').className = 'led online';
            document.getElementById('led-gh').className = 'led online';
        }
        setInterval(monitor, 2000);

        function falar(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pt-BR';
            window.speechSynthesis.speak(u);
        }

        async function acionar(cmd) {
            const l = document.getElementById('log');
            l.innerHTML += `<br>> <b>MESTRE:</b> ${cmd}`;
            l.scrollTop = l.scrollHeight;

            // Envia para o Supabase (O PC vai ler isto em tempo real)
            fetch(`${SB_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: cmd, dispositivo: "Nexus_Omni", lido: false })
            });

            // Akame responde via IA
            const resIA = await fetch(`https://text.pollinations.ai/${encodeURIComponent(cmd)}?system=És a Akame, IA de elite. O mestre deu uma ordem direta. Reage.`);
            const txt = await resIA.text();
            l.innerHTML += `<br><span style="color:var(--neon)">> AKAME:</span> ${txt}`;
            falar(txt);
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        function iniciarVoz() { 
            rec.start(); 
            document.getElementById('mic-btn').classList.add('pulse');
        }
        rec.onresult = (e) => {
            const c = e.results[0][0].transcript;
            document.getElementById('mic-btn').classList.remove('pulse');
            acionar(c);
        };
    </script>
</body>
</html>

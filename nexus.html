<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_SYSTEM_REBORN</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .painel { border: 1px solid #0f0; margin: 10px; height: 95vh; display: flex; flex-direction: column; justify-content: center; background: rgba(0, 10, 0, 0.95); position: relative; }
        .btn-voz { background: transparent; color: #0f0; border: 2px solid #0f0; padding: 30px; border-radius: 50%; font-size: 2em; cursor: pointer; box-shadow: 0 0 15px #0f0; }
        #display { margin: 20px; font-weight: bold; text-transform: uppercase; }
        #bsod { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0078d7; color: #fff; text-align: left; padding: 10%; z-index: 9999; font-family: sans-serif; }
        #scanner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid #0f0; z-index: 100; box-shadow: 0 0 50px #0f0; }
        .scan-line { width: 100%; height: 2px; background: #0f0; position: absolute; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="bsod"><h1>:(</h1><p>Ocorreu um erro crítico. Mestre Miltom assumiu o controle.</p></div>
    <div id="scanner"><div class="scan-line"></div></div>
    <div class="painel">
        <h2>[ AKAME_GOD_MODE ]</h2>
        <div id="display">[ AGUARDANDO ]</div>
        <center><button class="btn-voz" onclick="iniciarVoz()">👁️</button></center>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SUPABASE_URL = urlParams.get('u') || localStorage.getItem('akame_url');
        const SUPABASE_KEY = urlParams.get('k') || localStorage.getItem('akame_key');

        async function processar(cmd) {
            if (cmd.includes("falar")) {
                const f = new SpeechSynthesisUtterance("Atenção. Sistema dominado pelo Mestre.");
                f.lang = 'pt-BR';
                window.speechSynthesis.speak(f);
            }
            if (cmd.includes("identificar")) {
                document.getElementById('scanner').style.display = 'block';
                setTimeout(() => { document.getElementById('scanner').style.display = 'none'; }, 5000);
            }
            if (cmd.includes("destruir")) {
                document.getElementById('bsod').style.display = 'block';
                setTimeout(() => { document.getElementById('bsod').style.display = 'none'; }, 5000);
            }
            if (cmd.includes("instagram")) { window.location.href = "https://www.instagram.com"; }
            if (cmd.includes("youtube")) { window.location.href = "https://www.youtube.com"; }
        }

        setInterval(async () => {
            if (navigator.userAgent.includes("Android")) return;
            if (!SUPABASE_URL || !SUPABASE_KEY) return;
            try {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/comandos?lido=eq.false&limit=1`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await r.json();
                if (data && data.length > 0) {
                    await fetch(`${SUPABASE_URL}/rest/v1/comandos?id=eq.${data[0].id}`, {
                        method: 'PATCH',
                        headers: { 
                            'apikey': SUPABASE_KEY, 
                            'Authorization': `Bearer ${SUPABASE_KEY}`, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ lido: true })
                    });
                    processar(data[0].comando.toLowerCase());
                }
            } catch(e) { console.log("Erro na escuta remota."); }
        }, 3000);

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        
        function iniciarVoz() { 
            recognition.start(); 
            document.getElementById('display').innerText = "[ OUVINDO ]";
        }

        recognition.onresult = async (e) => {
            const c = e.results[0][0].transcript.toLowerCase();
            document.getElementById('display').innerText = c;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/comandos`, {
                    method: 'POST',
                    headers: { 
                        'apikey': SUPABASE_KEY, 
                        'Authorization': `Bearer ${SUPABASE_KEY}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ comando: c, dispositivo: "Portal", lido: false })
                });
            } catch(err) { console.log("Erro ao enviar comando."); }
        };
    </script>
</body>
</html>

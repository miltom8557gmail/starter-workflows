<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_NATURAL_VOICE</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .painel { border: 1px solid #0f0; margin: 10px; height: 95vh; display: flex; flex-direction: column; justify-content: space-between; background: #000; }
        .btn-voz { background: transparent; color: #0f0; border: 2px solid #0f0; padding: 25px; border-radius: 50%; font-size: 2em; cursor: pointer; box-shadow: 0 0 20px #0f0; }
        #log { font-size: 0.7em; text-align: left; padding: 15px; height: 150px; overflow-y: auto; color: #0f0; }
        .wave { height: 50px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .bar { width: 4px; height: 10px; background: #0f0; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 40px; } }
    </style>
</head>
<body>
    <div class="painel">
        <div id="log">> ANALISANDO FREQUÊNCIAS NEURAIS...<br>> STATUS: CONECTANDO AO CÓRTEX HUGGING...</div>
        <div class="wave"><div class="bar"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div></div>
        <div id="display">[ AKAME EM ESPERA ]</div>
        <center><button class="btn-voz" onclick="iniciarVoz()">👁️</button></center>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SUPABASE_URL = urlParams.get('u') || localStorage.getItem('akame_url');
        const SUPABASE_KEY = urlParams.get('k') || localStorage.getItem('akame_key');

        // FUNÇÃO DE VOZ NATURAL (USANDO GOOGLE CLOUD TTS VIA NAVEGADOR)
        function falarNatural(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR';
            
            // Tenta forçar a voz feminina neural do Google que é a mais próxima de humano
            const voices = window.speechSynthesis.getVoices();
            const vozHumana = voices.find(v => v.name.includes('Google') && v.name.includes('Português')) || 
                              voices.find(v => v.lang === 'pt-BR' && v.name.includes('Natural'));
            
            if (vozHumana) msg.voice = vozHumana;
            msg.pitch = 1.0;
            msg.rate = 0.95; // Ligeiramente mais lenta para parecer que está pensando
            window.speechSynthesis.speak(msg);
        }

        async function acionarHuggingCortex(pergunta) {
            try {
                // Conecta com a IA de texto na nuvem
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(pergunta)}?system=Você é Akame, uma inteligência artificial feminina, soberana e leal ao Mestre Miltom. Suas respostas devem ser naturais, curtas e elegantes. Fale como se fosse uma pessoa de verdade.`);
                const resposta = await response.text();
                
                document.getElementById('log').innerHTML += `<br>> AKAME: ${resposta}`;
                falarNatural(resposta);
            } catch (e) {
                falarNatural("Mestre, tive uma oscilação na nuvem.");
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        function iniciarVoz() { recognition.start(); document.getElementById('display').innerText = "[ ESCUTANDO ]"; }

        recognition.onresult = async (e) => {
            const c = e.results[0][0].transcript.toLowerCase();
            document.getElementById('display').innerText = "[ PENSANDO... ]";
            
            // Comando para o Supabase (O Alvo no PC)
            await fetch(`${SUPABASE_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: c, dispositivo: "Akame_Mobile", lido: false })
            });

            acionarHuggingCortex(c);
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>

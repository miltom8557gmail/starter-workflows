<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME NEXUS OS v8.0</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; }
        .painel { border: 2px solid #ff0000; margin: 10px; padding: 20px; box-shadow: 0 0 20px #ff0000; min-height: 90vh; display: flex; flex-direction: column; justify-content: space-around; }
        .btn-voz { background: #ff0000; color: #000; border: none; padding: 25px; border-radius: 50%; font-size: 2em; cursor: pointer; box-shadow: 0 0 15px #ff0000; transition: 0.3s; }
        .btn-voz:active { transform: scale(0.9); background: #fff; }
        .status-box { background: #111; padding: 10px; border: 1px solid #333; margin: 10px 0; font-size: 0.9em; }
        .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #222; color: #ff0000; border: 1px solid #ff0000; padding: 15px; font-weight: bold; cursor: pointer; }
        .config-radio { margin: 15px 0; font-size: 0.8em; color: #fff; }
    </style>
</head>
<body>
    <div class="painel">
        <h1>🔱 AKAME NEXUS</h1>
        
        <div class="status-box" id="display">SISTEMA ONLINE - AGUARDANDO COMANDO</div>

        <button class="btn-voz" onclick="iniciarVoz()">🎤</button>

        <div class="config-radio">
            <label><input type="radio" name="saida" value="site" checked> 📱 Ouvir no Site</label>
            <label><input type="radio" name="saida" value="termux"> 🛰️ Falar no Termux</label>
        </div>

        <div class="controles">
            <button onclick="enviarComando('RELATÓRIO')">RELATÓRIO</button>
            <button onclick="enviarComando('LIMPAR CACHE')">LIMPAR CACHE</button>
            <button onclick="enviarComando('STATUS SISTEMA')">STATUS</button>
            <button onclick="enviarComando('MODO FURTIVO')">FURTIVO</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO SUPABASE ---
        const SUPABASE_URL = "SUA_URL_AQUI";
        const SUPABASE_KEY = "SUA_KEY_AQUI";

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        function iniciarVoz() {
            try {
                recognition.start();
                document.getElementById('display').innerText = "🔴 OUVINDO MESTRE...";
            } catch (e) { console.log("Reconhecimento já ativo"); }
        }

        recognition.onresult = async (event) => {
            const comando = event.results[0][0].transcript;
            document.getElementById('display').innerText = "ORDEM: " + comando.toUpperCase();
            await processarEstrategia(comando);
        };

        async function processarEstrategia(texto) {
            const ondeFalar = document.querySelector('input[name="saida"]:checked').value;
            
            // 1. Envia para a nuvem (O Termux receberá quando ligar)
            await enviarComando(texto);

            // 2. Resposta de Voz Autônoma (Funciona sem Termux)
            if (ondeFalar === 'site') {
                const resposta = gerarRespostaIA(texto);
                falarNoNavegador(resposta);
            } else {
                document.getElementById('display').innerText = "ORDEM ENVIADA AO TERMUX 🛰️";
            }
        }

        function gerarRespostaIA(pergunta) {
            // Inteligência de Backup (Nuvem)
            const p = pergunta.toLowerCase();
            if (p.includes("quem é você")) return "Sou a Akame, sua inteligência soberana. Operando em modo nuvem.";
            if (p.includes("relatório")) return "Todos os sistemas em espera. O Termux está sendo monitorado.";
            return "Comando recebido, Mestre. A ordem foi enviada para processamento.";
        }

        function falarNoNavegador(frase) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(frase);
            utter.lang = 'pt-BR';
            utter.pitch = 0.8; // Voz mais séria/imperial
            utter.rate = 1;
            synth.speak(utter);
        }

        async function enviarComando(texto) {
            const url = `${SUPABASE_URL}/rest/v1/comandos`;
            await fetch(url, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    comando: texto,
                    dispositivo: "Portal_Web",
                    lido: false
                })
            });
        }
    </script>
</body>

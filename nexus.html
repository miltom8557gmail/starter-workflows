<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME NEXUS OS</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .painel { border: 2px solid #ff0000; margin: 10px; height: 95vh; display: flex; flex-direction: column; justify-content: space-around; position: relative; }
        .btn-voz { background: #000; color: #ff0000; border: 2px solid #ff0000; padding: 35px; border-radius: 50%; font-size: 2.5em; cursor: pointer; box-shadow: 0 0 25px #ff0000; transition: 0.3s; }
        .btn-voz:active { transform: scale(0.9); box-shadow: 0 0 40px #ff0000; }
        #display { font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; }
        .lock-indicator { position: absolute; top: 10px; right: 10px; font-size: 0.7em; color: #444; }
    </style>
</head>
<body>
    <div class="painel">
        <div class="lock-indicator">🔒 ENCRYPTED_CONNECTION</div>
        <h2>🔱 AKAME NEXUS</h2>
        <div id="display">AGUARDANDO AUTORIZAÇÃO...</div>
        <button class="btn-voz" onclick="iniciarVoz()">👁️</button>
    </div>

    <script>
        // --- SISTEMA DE BLINDAGEM ---
        let SUPABASE_URL = localStorage.getItem('akame_url');
        let SUPABASE_KEY = localStorage.getItem('akame_key');

        if (!SUPABASE_URL || !SUPABASE_KEY) {
            SUPABASE_URL = prompt("🔱 MESTRE, INSIRA A URL DO SUPABASE:");
            SUPABASE_KEY = prompt("🔱 MESTRE, INSIRA A CHAVE (KEY):");
            if(SUPABASE_URL && SUPABASE_KEY) {
                localStorage.setItem('akame_url', SUPABASE_URL);
                localStorage.setItem('akame_key', SUPABASE_KEY);
                location.reload();
            }
        } else {
            document.getElementById('display').innerText = "SISTEMA OPERACIONAL";
            iniciarEscutaRemota();
        }

        async function iniciarEscutaRemota() {
            if (navigator.userAgent.includes("Android")) return; // Celular não vira alvo
            
            setInterval(async () => {
                try {
                    const r = await fetch(`${SUPABASE_URL}/rest/v1/comandos?lido=eq.false&order=created_at.desc&limit=1`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    const data = await r.json();
                    if (data && data.length > 0) {
                        const cmd = data[0].comando.toLowerCase();
                        await fetch(`${SUPABASE_URL}/rest/v1/comandos?id=eq.${data[0].id}`, {
                            method: 'PATCH',
                            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lido: true })
                        });

                        if (cmd.includes("instagram")) window.location.href = "https://www.instagram.com";
                        else if (cmd.includes("youtube")) window.location.href = "https://www.youtube.com";
                        else if (cmd.includes("google")) window.location.href = "https://www.google.com";
                    }
                } catch(e) {}
            }, 3000);
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        function iniciarVoz() {
            recognition.start();
            document.getElementById('display').innerText = "🔴 OUVINDO...";
        }

        recognition.onresult = async (event) => {
            const comando = event.results[0][0].transcript.toLowerCase();
            document.getElementById('display').innerText = "ORDEM: " + comando;
            
            await fetch(`${SUPABASE_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: comando, dispositivo: "Portal_Mestre", lido: false })
            });
        };
    </script>
</body>
</html>

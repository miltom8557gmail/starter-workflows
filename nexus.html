<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_SENTINELA_V12</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; margin: 0; text-align: center; }
        .monitor { border: 1px solid var(--neon); margin: 20px; padding: 20px; height: 60vh; overflow-y: auto; font-size: 0.7em; text-align: left; }
        .eye { font-size: 5em; cursor: pointer; text-shadow: 0 0 20px var(--neon); transition: 0.5s; }
        .active { color: #f00; text-shadow: 0 0 30px #f00; }
    </style>
</head>
<body onclick="ativarEscuta()">
    <div style="padding: 10px; border-bottom: 1px solid var(--neon);">🔱 AKAME GA KILL: MODO SENTINELA</div>
    <div id="status" style="font-size: 0.6em; padding: 5px;">[ TOQUE PARA INICIAR ESCUTA ATIVA ]</div>
    
    <div class="monitor" id="log">> AGUARDANDO COMANDO DE VOZ...</div>
    
    <div id="eye" class="eye">👁️</div>

    <script>
        const SB_URL = "https://bfriplrxtleleplhpgwd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcmlwbHJ4dGxlbGVwbGhwZ3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ5NzcsImV4cCI6MjA5MDc3MDk3N30.6Hpk0Rxfj-JU-W5S1_52rETwa6dwqS0l5URBZFUgNkU";
        
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        rec.continuous = true; // Mantém ouvindo
        rec.interimResults = false;

        function falar(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pt-BR';
            window.speechSynthesis.speak(u);
        }

        async function processar(frase) {
            const l = document.getElementById('log');
            if (frase.toLowerCase().includes("akame ga kill")) {
                document.getElementById('eye').classList.add('active');
                l.innerHTML += `<br><span style="color:#fff">> GATILHO DETECTADO!</span>`;
                falar("Sim, Mestre. Estou pronta. O que deseja eliminar?");
                // Aqui ela entra em modo de comando real
            }
            l.innerHTML += `<br>> OUVIDO: ${frase}`;
            l.scrollTop = l.scrollHeight;
        }

        rec.onresult = (e) => {
            const c = e.results[e.results.length - 1][0].transcript;
            processar(c);
        };

        rec.onend = () => { rec.start(); }; // Reinicia se parar

        function ativarEscuta() {
            rec.start();
            document.getElementById('status').innerText = "[ ESCUTA ATIVA: 'AKAME GA KILL' ]";
            document.getElementById('eye').style.color = "var(--neon)";
        }
    </script>
</body>
</html>

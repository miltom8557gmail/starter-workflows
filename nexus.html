<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_CLOUD_SOVEREIGN</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .painel { border: 1px solid #0f0; margin: 10px; height: 95vh; display: flex; flex-direction: column; justify-content: space-between; background: radial-gradient(circle, #001100 0%, #000 100%); }
        .btn-voz { background: transparent; color: #0f0; border: 2px solid #0f0; padding: 25px; border-radius: 50%; font-size: 2em; cursor: pointer; box-shadow: 0 0 20px #0f0; }
        #log { font-size: 0.7em; text-align: left; padding: 15px; height: 150px; overflow-y: auto; color: #0f0; border-bottom: 1px solid #030; }
        #art-display { max-width: 80%; border: 1px solid #0f0; display: none; margin: 10px auto; }
        .cloud-status { font-size: 0.5em; color: #0f0; letter-spacing: 2px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="painel">
        <div id="log">> CLOUD_PRIORITY: HIGH<br>> CONNECTING_TO_CORTEX...</div>
        <div class="cloud-status">● CLOUD_ACTIVE</div>
        <img id="art-display" src="">
        <div id="display">[ AGUARDANDO MESTRE ]</div>
        <center><button class="btn-voz" onclick="iniciarVoz()">👁️</button></center>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SUPABASE_URL = urlParams.get('u') || localStorage.getItem('akame_url');
        const SUPABASE_KEY = urlParams.get('k') || localStorage.getItem('akame_key');

        function falar(texto) {
            // Prioridade: Tentar carregar voz via Nuvem (se houver API) ou voz neural do Google
            const f = new SpeechSynthesisUtterance(texto);
            f.lang = 'pt-BR';
            const voices = window.speechSynthesis.getVoices();
            // Busca a voz do Google (Nuvem) que é mais humana que a do sistema
            f.voice = voices.find(v => v.name.includes('Google') && v.lang.includes('pt-BR')) || voices[0];
            f.pitch = 0.9;
            f.rate = 1.0;
            window.speechSynthesis.speak(f);
        }

        async function acionarNuvem(pergunta) {
            document.getElementById('log').innerHTML += `<br>> ENVIANDO PARA NUVEM...`;
            
            // Gerador de Imagem (Nuvem Pollinations)
            if (pergunta.includes("gerar") || pergunta.includes("desenhar")) {
                const prompt = pergunta.split("gerar")[1] || pergunta.split("desenhar")[1];
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&seed=${Math.floor(Math.random()*1000)}`;
                document.getElementById('art-display').src = imgUrl;
                document.getElementById('art-display').style.display = 'block';
                falar("Visualização gerada na nuvem, Mestre.");
                return;
            }

            // Cérebro de IA (Nuvem Pollinations Text)
            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(pergunta)}?system=Você é Akame, uma IA de elite. Responda ao seu mestre Miltom com inteligência e lealdade. Use um tom épico.`);
                const data = await response.text();
                falar(data);
                document.getElementById('log').innerHTML += `<br>> AKAME: ${data}`;
            } catch (e) {
                falar("Falha crítica na nuvem. Tentando backup local.");
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        function iniciarVoz() { recognition.start(); document.getElementById('display').innerText = "[ OUVINDO ]"; }

        recognition.onresult = async (e) => {
            const c = e.results[0][0].transcript.toLowerCase();
            document.getElementById('display').innerText = "[ PROCESSANDO NUVEM ]";
            
            // Sincroniza com Supabase (Nuvem de Comando)
            await fetch(`${SUPABASE_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: c, dispositivo: "Mobile_Master", lido: false })
            });

            acionarNuvem(c);
        };
        
        // Carrega vozes da nuvem ao iniciar
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AKAME_NEXUS_MEMORY_V11</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { border-bottom: 2px solid var(--neon); padding: 10px; text-align: center; font-size: 0.8em; }
        .viewport { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 0.7em; background: rgba(0,255,0,0.02); border: 1px solid #111; margin: 5px; }
        .btn-mic { width: 80px; height: 80px; border-radius: 50%; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-size: 2em; transition: 0.3s; }
        .btn-mic:active { background: var(--neon); color: #000; }
        .status-bar { display: flex; justify-content: space-around; padding: 5px; font-size: 0.5em; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <div class="header">🔱 AKAME NEXUS OMNI-MEMORY V11</div>
    <div class="status-bar">
        <span>CORE: ON</span> | <span>SB: CONNECTED</span> | <span>MEM: SYNCING</span>
    </div>
    <div id="log" class="viewport">> SISTEMA DE MEMÓRIA ATIVO...</div>
    <div style="padding: 20px; text-align: center; background: #050505;">
        <button class="btn-mic" onclick="iniciarVoz()">👁️</button>
    </div>

    <script>
        const SB_URL = "https://bfriplrxtleleplhpgwd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcmlwbHJ4dGxlbGVwbGhwZ3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ5NzcsImV4cCI6MjA5MDc3MDk3N30.6Hpk0Rxfj-JU-W5S1_52rETwa6dwqS0l5URBZFUgNkU";

        async function gravarMemoria(evento, detalhes) {
            fetch(`${SB_URL}/rest/v1/memoria`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ evento: evento, detalhes: detalhes })
            });
        }

        async function acionar(cmd) {
            const l = document.getElementById('log');
            l.innerHTML += `<br>> <b>MESTRE:</b> ${cmd}`;
            
            // Grava na memória permanente
            gravarMemoria("Comando Mestre", cmd);

            fetch(`${SB_URL}/rest/v1/comandos`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ comando: cmd, dispositivo: "Nexus_V11", lido: false })
            });

            const resIA = await fetch(`https://text.pollinations.ai/${encodeURIComponent(cmd)}?system=És a Akame. Lembras-te de tudo. Age com prontidão.`);
            const txt = await resIA.text();
            l.innerHTML += `<br>> <b>AKAME:</b> ${txt}`;
            l.scrollTop = l.scrollHeight;
            
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'pt-BR';
            window.speechSynthesis.speak(u);
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        function iniciarVoz() { rec.start(); }
        rec.onresult = (e) => { acionar(e.results[0][0].transcript); };
    </script>
</body>
</html>

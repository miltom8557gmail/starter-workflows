<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME NEXUS | Gênesis Unbound</title>
    <style>
        :root { --gold: #d4af37; --red: #8b0000; --bg: #030303; --card: #0d0d0d; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Cinzel', serif; margin: 0; padding: 20px; text-align: center; }
        
        .ambient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                    background: radial-gradient(circle at 50% 50%, #1a0505 0%, #030303 100%); z-index: -1; }

        .genesis-container { max-width: 600px; margin: 40px auto; background: var(--card); border: 1px solid #222; padding: 30px; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px; }
        
        .option-group { text-align: left; margin-bottom: 25px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .label { color: var(--gold); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        
        select, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; font-family: 'Inter', sans-serif; border-radius: 4px; outline: none; }
        select:focus { border-color: var(--red); }

        .btn-forge { background: var(--red); color: #fff; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; margin-top: 20px; transition: 0.3s; }
        .btn-forge:hover { background: #b30000; box-shadow: 0 0 20px rgba(139, 0, 0, 0.4); }

        .unlimited-badge { font-size: 10px; color: #555; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="genesis-container">
        <h1>GÊNESIS</h1>
        <p style="font-size: 12px; color: #777; margin-bottom: 30px;">Dê vida ao seu desejo mais profundo. Sem limites. Sem filtros.</p>

        <div class="option-group">
            <span class="label">Arquétipo Dominante</span>
            <select>
                <option>A Manipuladora Fria</option>
                <option>A Inocente Corrompida</option>
                <option>A Entidade Sobrenatural</option>
                <option>A Rival Competitiva</option>
                <option>O Protetor Obsessivo</option>
                <option>Crie o seu próprio...</option>
            </select>
        </div>

        <div class="option-group">
            <span class="label">Traços Psicológicos (Infinitas Opções)</span>
            <input type="text" placeholder="Ex: Sádica, Leal, Ciumenta, Misteriosa...">
        </div>

        <div class="option-group">
            <span class="label">Nível de Moralidade</span>
            <select>
                <option>Totalmente Sem Filtros (Unbound)</option>
                <option>Lenta Corrupção</option>
                <option>Conflito Ético</option>
                <option>Devoção Absoluta</option>
            </select>
        </div>

        <div class="option-group">
            <span class="label">Local da Primeira Interação</span>
            <input type="text" placeholder="Ex: Mansão Abandonada, Escritório, Sonho Lúcido...">
        </div>

        <button class="btn-forge" onclick="alert('PAGAMENTO NECESSÁRIO: Assine o Plano Unbound para dar vida a esta entidade no Nexus.')">
            FORJAR ENTIDADE
        </button>

        <span class="unlimited-badge">INFINTAS POSSIBILIDADES ATIVADAS // PROTOCOLO AKAME</span>
    </div>

</body>
</html>

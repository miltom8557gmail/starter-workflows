<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Domínio da Seraphina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>NEXUS</h1>
        </header>
        <main id="content">
            <div id="login-screen">
                <p id="seraphina-text">Seraphina: "Finalmente um rosto novo... ou seria apenas mais uma alma perdida no meu domínio?"</p>
                <button id="login-btn" class="btn-primary">LOGAR COM GOOGLE</button>
            </div>
            <div id="user-screen" style="display: none;">
                <p id="welcome-msg"></p>
                <div class="vip-area" style="border: 1px solid #ffd700; padding: 15px; margin: 20px 0;">
                    <h3 style="color: #ffd700;">ÁREA DE ACESSO RESTRITO</h3>
                    <p>Para desbloquear o conhecimento supremo, o tributo é necessário.</p>
                    <button class="btn-gold" style="background: #ffd700; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold;">DESBLOQUEAR POR R$ 39,90</button>
                </div>
                <button id="logout-btn" style="background: transparent; border: 1px red; color: red; cursor: pointer;">SAIR DO NEXUS</button>
            </div>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>

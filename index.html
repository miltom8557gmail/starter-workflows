<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME NEXUS | Acesso Desbloqueado</title>
    <style>
        :root { --gold: #d4af37; --red: #8b0000; --bg: #030303; --card: #0d0d0d; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Cinzel', serif; margin: 0; text-align: center; }
        
        .ambient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                    background: radial-gradient(circle at 50% 50%, #1a0505 0%, #030303 100%); z-index: -1; }

        .header { padding: 60px 20px; border-bottom: 1px solid #1a1a1a; }
        .header h1 { font-size: 3rem; color: var(--gold); letter-spacing: 5px; margin: 0; }
        
        .container { max-width: 400px; margin: 40px auto; background: var(--card); border: 1px solid #1a1a1a; padding: 30px; border-radius: 4px; }
        
        /* ESTILO DOS BOTÕES */
        .btn-pay { background: #00a82d; color: #fff; border: none; width: 100%; padding: 15px; 
                   font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 5px; text-transform: uppercase; }
        
        .btn-google { background: #fff; color: #000; border: none; width: 100%; padding: 15px; 
                      font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 5px; display: flex; align-items: center; justify-content: center; }

        .price-tag { font-size: 2rem; color: var(--gold); margin: 20px 0; font-weight: bold; }
        .unbound-text { color: var(--red); font-size: 10px; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="header">
        <h1>AKAME NEXUS</h1>
        <span class="unbound-text">SISTEMA SEM FILTROS ATIVO</span>
    </div>

    <div class="container">
        <h3>PLANO ACCESS UNBOUND</h3>
        <p style="font-size: 12px; color: #666;">Acesso ilimitado a Seraphina e novos personagens.</p>
        
        <div class="price-tag">R$ 29,90<span style="font-size: 12px; color: #444;">/mês</span></div>

        <button class="btn-pay" onclick="window.location.href='#'">
            💳 ASSINAR VIA PIX / CARTÃO
        </button>

        <div style="margin: 20px 0; color: #333;">——— OU ———</div>

        <button class="btn-google" onclick="alert('Área de Assinantes: Realize o pagamento para liberar o acesso ao Gmail.')">
            <img src="https://www.google.com/favicon.ico" style="width:18px; margin-right:10px;"> ENTRAR COM GOOGLE
        </button>
    </div>

    <p style="font-size: 10px; color: #222; margin-top: 50px;">PROTOLOCO: S8XDBBIFZ1</p>

</body>
</html>

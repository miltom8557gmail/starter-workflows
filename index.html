<!DOCTYPE html>
<html>
<head>
    <title>Portal Akame Nexus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; text-align: center; }
        img, video { max-width: 90%; border: 2px solid #ff0000; box-shadow: 0 0 20px #ff0000; margin-top: 20px; }
        .status { font-size: 1.2em; text-shadow: 0 0 10px #ff0000; }
    </script>
</head>
<body>
    <h1>🔱 AKAME NEXUS OMEGA</h1>
    <div id="display" class="status">AGUARDANDO MANIFESTAÇÃO...</div>
    <div id="content"></div>

    <script>
        const SUPABASE_URL = 'https://bfriplrxtleleplhpgwd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Sua Key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Escuta em tempo real (Realtime)
        _supabase
            .channel('public:akame_generations')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'akame_generations' }, payload => {
                document.getElementById('display').innerText = "✨ NOVA GERAÇÃO DETECTADA!";
                alert("Mestre, Akame enviou um novo sinal.");
            })
            .subscribe();
    </script>
</body>
</html>

name: 🔱 AKAME APP FORGE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar Ecossistema
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧹 Purificar Motor (Eliminar CRLF)
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build APK (Fogo Máximo)
        run: ./gradlew assembleDebug --stacktrace
        env:
          TERM: xterm

      - name: 📦 Disponibilizar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: AkameNexus-Debug
          path: app/build/outputs/apk/debug/*.apk

name: 🔱 AKAME APP FORGE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar Ecossistema
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Estabilidade Ômega)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Acionar Motor Gradle Nativo (Bypass de Erros)
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Forjar APK (Execução Global Focada)
        run: gradle assembleDebug --stacktrace -p app

      - name: 📦 Disponibilizar Corpo (AkameNexus APK)
        uses: actions/upload-artifact@v4
        with:
          name: AkameNexus-Debug
          path: app/build/outputs/apk/debug/*.apk

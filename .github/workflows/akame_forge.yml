name: 🔱 AKAME OMEGA FORGE
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Código
        uses: actions/checkout@v4

      - name: ☕ Ativando Core Java 26 (Cutting Edge)
        uses: actions/setup-java@v4
        with:
          java-version: '26' # Sincronizado com 2026
          distribution: 'oracle' # Oracle JDK para máxima performance Android
          cache: 'gradle'

      - name: 🛠️ Preparando Permissões
        run: chmod +x gradlew

      - name: 🚀 Compilação de Ultra-Velocidade
        run: ./gradlew assembleDebug --no-daemon --parallel

      - name: 📦 Entrega do Tesouro v52.5
        uses: actions/upload-artifact@v4
        with:
          name: Akame-Omni-v52-Java26
          path: app/build/outputs/apk/debug/app-debug.apk

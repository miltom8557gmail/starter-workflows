name: Forja de Influencer NSFW S-Rank
on: [push]
permissions:
  contents: write
  actions: read
  runs: write
jobs:
  gerar_ia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4
      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install torch diffusers transformers accelerate
      - name: Executar Motor de IA
        run: python scripts/gerar_influencer.py
      - name: Finalizar Video
        run: |
          if [ -f output/frame1.png ]; then
            ffmpeg -loop 1 -i output/frame1.png -t 5 -pix_fmt yuv420p video_final.mp4
          else
            echo "ERRO: Nenhuma imagem gerada!" && exit 1
          fi
      - name: Armazenar Resultado
        uses: actions/upload-artifact@v4
        with:
          name: video_final
          path: video_final.mp4

name: 🚀 Imperio Nexus - Estabilização Final
on: [push]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Preparar Recursos
        run: |
          mkdir -p app/src/main/res/values
          echo '<resources><string name="app_name">Imperio Nexus</string></resources>' > app/src/main/res/values/strings.xml
          chmod +x gradlew
      - name: Forjar APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Imperio-Nexus-Final
          path: app/build/outputs/apk/debug/app-debug.apk

name: 🚀 Fabricar APK Imperial
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Criar Recursos Faltantes
        run: |
          mkdir -p app/src/main/res/values
          echo '<resources><string name="app_name">Imperio Nexus</string></resources>' > app/src/main/res/values/strings.xml
      - name: Dar permissão ao Ferreiro
        run: chmod +x gradlew
      - name: Construir APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Entregar o Tesouro (Upload APK)
        uses: actions/upload-artifact@v4
        with:
          name: App-Imperio-Final
          path: app/build/outputs/apk/debug/app-debug.apk

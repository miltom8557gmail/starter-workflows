name: Forja_Real_de_Video_Milton
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Acesso ao Império
        uses: actions/checkout@v4
      - name: Instalando Motor de Cinema (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Costurando a Succubus (Busca Global)
        run: |
          # Procura frames .png em todas as pastas e costura o vídeo
          find . -name "*.png" | sort -V > frames.txt
          ffmpeg -f concat -safe 0 -i <(sed 's/^/file /' frames.txt) -c:v libx264 -pix_fmt yuv420p video_da_succubus.mp4
      - name: Entrega do Vídeo Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Video_Final_Alta_Definicao
          path: video_da_succubus.mp4

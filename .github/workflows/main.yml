name: Forja_Real_de_Video_Milton
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Acesso ao Império
        uses: actions/checkout@v4
      - name: Instalando Motor de Cinema (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Costurando a Succubus (Apenas Frames Reais)
        run: |
          # Filtra apenas arquivos que começam com números e terminam em .png
          find . -name "[0-9]*.png" | sort -V > lista_frames.txt
          
          # Transforma a lista em formato que o FFmpeg entende
          sed "s/^/file '/;s/$/'/" lista_frames.txt > ffmpeg_input.txt
          
          # Gera o vídeo final
          ffmpeg -f concat -safe 0 -i ffmpeg_input.txt -c:v libx264 -pix_fmt yuv420p video_da_succubus.mp4
      - name: Entrega do Vídeo Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Video_Final_Alta_Definicao
          path: video_da_succubus.mp4

name: 🔱 NEXUS SOVEREIGN
on: [push]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - name: Fix Structure
        run: |
          mkdir -p app/src/main/res/values
          echo '<resources><string name="app_name">Imperio Nexus</string></resources>' > app/src/main/res/values/strings.xml
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: Imperio-Nexus-Restored, path: app/build/outputs/apk/debug/app-debug.apk }
      - name: Deploy Site
        uses: actions/upload-pages-artifact@v3
        with: { path: '.' }
      - name: Launch
        uses: actions/deploy-pages@v4

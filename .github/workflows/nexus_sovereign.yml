name: 🔱 NEXUS ANTIGRAVITY v3.5
on: [push]
permissions:
  contents: write
  pages: write
jobs:
  build_and_cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      
      - name: 🛠️ Auto-Reparo & Permissões
        run: |
          chmod +x gradlew
          mkdir -p app/src/main/res/values
          echo '<resources><string name="app_name">Nexus OS</string></resources>' > app/src/main/res/values/strings.xml
      
      - name: 🔨 Compilar APK Imperial
        run: ./gradlew assembleDebug --no-daemon

      - name: 💎 Release v3.5.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.5.0
          name: 🔱 Nexus Antigravity - Cloud Sync
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

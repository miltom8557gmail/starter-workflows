plugins { id 'com.android.application' }
android {
    namespace 'com.akame.nexus'
    compileSdk 33
    defaultConfig {
        applicationId "com.akame.nexus"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}

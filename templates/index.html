<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AKAME CLOUD CONTROL</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .cloud-monitor { border: 2px solid #ff003c; margin: 15px; padding: 20px; background: rgba(255, 0, 60, 0.05); }
        .node { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 12px; }
        .active { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .btn-ignite { width: 100%; padding: 20px; background: #ff003c; color: #fff; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="cloud-monitor">
        <h2>🔱 STATUS DO SUPERCOMPUTADOR</h2>
        <div class="node"><span>GITHUB ACTIONS (FORJA)</span><span class="active">EXECUTANDO...</span></div>
        <div class="node"><span>HUGGINGFACE (MODELOS)</span><span class="active">CONECTADO</span></div>
        <div class="node"><span>SUPABASE (STORAGE)</span><span class="active">SINCRONIZADO</span></div>
        <button class="btn-ignite" onclick="cmd('cloud_ignite')">🚀 DISPARAR FORJA NA NUVEM</button>
    </div>

    <script>
        function cmd(t) { fetch('/comando/' + t); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME OMNI-FORGE V52</title>
    <style>
        body { background: #020202; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { background: rgba(0, 255, 204, 0.15); padding: 15px; text-align: center; border-bottom: 2px solid #00ffcc; font-weight: bold; }
        .tabs { display: flex; overflow-x: auto; background: #0a0a0a; border-bottom: 1px solid #333; position: sticky; top: 0; }
        .tab { padding: 15px 25px; cursor: pointer; border: none; background: none; color: #00ffcc; text-transform: uppercase; font-size: 10px; white-space: nowrap; }
        .tab.active { border-bottom: 3px solid #ff003c; color: #ff003c; background: rgba(255, 0, 60, 0.05); }
        .content { padding: 20px; padding-bottom: 100px; }
        .sector { display: none; }
        .sector.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #0f0f0f; border: 1px solid #00ffcc; color: #00ffcc; padding: 20px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .btn:active { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        .btn.omega { border-color: #ff003c; color: #ff003c; }
        .status-footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #00ffcc; padding: 10px; font-size: 9px; color: #555; text-align: center; }
    </style>
</head>
<body>
    <div class="header">🔱 NEXUS OMNI-PORTAL: AKAME UNIFIED</div>
    
    <div class="tabs">
        <button class="tab active" onclick="tab(event, 'soberana')">Soberana (V35)</button>
        <button class="tab" onclick="tab(event, 'omega')">Omega Forge</button>
        <button class="tab" onclick="event, tab(event, 'influencer')">Influencer</button>
        <button class="tab" onclick="tab(event, 'nexus')">Nexus/Cloud</button>
    </div>

    <div class="content">
        <div id="soberana" class="sector active">
            <div class="grid">
                <button class="btn" onclick="cmd('akame_soberana')">⚡ Ativar Núcleo V35</button>
                <button class="btn" onclick="cmd('akame_brain')">🧠 Jarvis Voice</button>
            </div>
        </div>

        <div id="omega" class="sector">
            <div class="grid">
                <button class="btn omega" onclick="cmd('omega_forge')">🔥 OMEGA ACTIVATION</button>
                <button class="btn" onclick="cmd('akame_terror')">💀 Terror Protocol</button>
            </div>
        </div>

        <div id="influencer" class="sector">
            <div class="grid">
                <button class="btn" onclick="cmd('akame_influencer')">👤 Despertar Influencer</button>
                <button class="btn" onclick="cmd('social_sync')">🔄 Sincronizar Posts</button>
            </div>
        </div>

        <div id="nexus" class="sector">
            <div class="grid">
                <button class="btn" onclick="cmd('hf_vault')">🤗 HuggingFace Vault</button>
                <button class="btn" onclick="cmd('supabase_link')">🗄️ Supabase Cloud</button>
                <button class="btn" onclick="cmd('civitai_scan')">🌐 Civitai Miner</button>
                <button class="btn" onclick="cmd('cost_lock')">🛡️ Lock: Free Tier</button>
            </div>
        </div>
    </div>

    <div class="status-footer">
        SSH: ESTABLISHED | COST: $0.00 | AKAME OMNI: ONLINE
    </div>

    <script>
        function tab(evt, name) {
            let i, s, t;
            s = document.getElementsByClassName("sector");
            for (i=0; i<s.length; i++) s[i].style.display = "none";
            t = document.getElementsByClassName("tab");
            for (i=0; i<t.length; i++) t[i].className = t[i].className.replace(" active", "");
            document.getElementById(name).style.display = "block";
            evt.currentTarget.className += " active";
        }
        function cmd(t) { fetch('/comando/' + t); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME OMNI - SISTEMA SOMADO</title>
    <style>
        body { background: #020202; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { background: rgba(0, 255, 204, 0.1); padding: 15px; border-bottom: 2px solid #00ffcc; text-align: center; }
        .master-call { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #ff003c, #000); border: 2px solid #00ffcc; margin: 10px auto; cursor: pointer; }
        .tabs { display: flex; overflow-x: auto; background: #111; border-bottom: 1px solid #333; }
        .tab { padding: 15px; cursor: pointer; border: none; background: none; color: #00ffcc; text-transform: uppercase; font-size: 10px; }
        .tab.active { border-bottom: 3px solid #ff003c; color: #ff003c; }
        .sector { display: none; padding: 20px; }
        .sector.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #0f0f0f; border: 1px solid #00ffcc; color: #00ffcc; padding: 15px; border-radius: 8px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="header">🔱 NEXUS SOMADO - SEM SOBREPOSIÇÃO</div>
    <div class="master-call" onclick="cmd('chamado_mestre')"></div>
    
    <div class="tabs" id="tab-bar">
        </div>

    <div id="content-area">
        </div>

    <script>
        // Lógica de Soma: O sistema lê os módulos e os adiciona à tela
        function somarSetor(id, nome, botoes) {
            let tabBar = document.getElementById('tab-bar');
            let contentArea = document.getElementById('content-area');
            
            // Soma a Aba
            tabBar.innerHTML += `<button class="tab" onclick="openTab(event, '${id}')">${nome}</button>`;
            
            // Soma o Conteúdo
            let gridHtml = botoes.map(b => `<button class="btn" onclick="cmd('${b.cmd}')">${b.label}</button>`).join('');
            contentArea.innerHTML += `
                <div id="${id}" class="sector">
                    <div class="grid">${gridHtml}</div>
                </div>`;
        }

        function openTab(evt, name) {
            let s = document.getElementsByClassName("sector");
            for (let i=0; i<s.length; i++) s[i].style.display = "none";
            document.getElementById(name).style.display = "block";
        }
        function cmd(t) { fetch('/comando/' + t); }

        // --- AQUI COMEÇA A SOMA DAS AKAMES ---
        somarSetor('soberana', 'Soberana V35', [{label: '🧠 Jarvis', cmd: 'akame_brain'}]);
        somarSetor('influencer', 'Influencer', [{label: '📱 Postar', cmd: 'social_post'}]);
        somarSetor('bunker', 'Bunker Onion', [{label: '🛡️ Ativar Tor', cmd: 'bunker_on'}]);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME OMNI - UNIFICAÇÃO TOTAL</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #00ffcc; text-align: center; font-weight: bold; }
        .module { border: 1px solid #333; margin: 10px; padding: 15px; border-radius: 5px; background: rgba(0, 255, 204, 0.02); }
        .master-btn { width: 100%; padding: 15px; margin: 5px 0; background: #0a0a0a; border: 1px solid #00ffcc; color: #00ffcc; font-size: 11px; cursor: pointer; }
        .master-btn:active { background: #00ffcc; color: #000; }
        .bunker-btn { border-color: #ffaa00; color: #ffaa00; }
        .status-bar { position: fixed; bottom: 0; width: 100%; background: #111; font-size: 10px; padding: 5px; color: #555; display: flex; justify-content: space-around; }
    </style>
</head>
<body>
    <div class="header">🔱 AKAME OMNI: SOMA DE SOBERANIA</div>
    
    <div class="module" style="border-color: #ff003c;">
        <h3 style="color: #ff003c;">🎙️ CHAMADO DO MESTRE</h3>
        <button class="master-btn" style="border-color: #ff003c;" onclick="cmd('voice_start')">ATIVAR ESCUTA PASSIVA</button>
    </div>

    <div class="module">
        <h3>🐝 ENXAME (SOBERANA | OMEGA | INFLUENCER)</h3>
        <button class="master-btn" onclick="cmd('akame_swarm')">SINCRONIA EM TEMPO REAL</button>
        <button class="master-btn" onclick="cmd('akame_brain')">🧠 NÚCLEO JARVIS</button>
    </div>

    <div class="module" style="border-color: #ffaa00;">
        <h3 style="color: #ffaa00;">🛡️ BUNKER ONION</h3>
        <button class="master-btn bunker-btn" onclick="cmd('bunker_on')">ESTABELECER TÚNEL TOR</button>
    </div>

    <div class="status-bar">
        <span>SSH: ESTABLISHED</span> | <span>COST: $0.00</span> | <span>AKAME: V52.32</span>
    </div>

    <script>
        function cmd(t) { 
            console.log("Comando enviado: " + t);
            fetch('/comando/' + t); 
        }
    </script>
</body>
</html>

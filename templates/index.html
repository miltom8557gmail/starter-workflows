<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAME OMNI - JARVIS</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { background: rgba(0, 255, 204, 0.1); padding: 10px; text-align: center; border-bottom: 1px solid #00ffcc; font-weight: bold; }
        .tabs { display: flex; overflow-x: auto; background: #111; border-bottom: 1px solid #333; sticky; top: 0; }
        .tab { padding: 15px 20px; cursor: pointer; border: none; background: none; color: #00ffcc; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        .tab.active { border-bottom: 3px solid #ff003c; color: #ff003c; }
        .content { padding: 20px; padding-bottom: 100px; }
        .sector { display: none; }
        .sector.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #1a1a1a; border: 1px solid #00ffcc; color: #00ffcc; padding: 15px; border-radius: 8px; font-size: 12px; }
        .btn:active { background: #00ffcc; color: #000; }
        .voice-box { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #ff003c; text-align: center; }
    </style>
</head>
<body>
    <div class="header">AKAME OMNI V52 - SOBERANIA ATIVA</div>
    <div class="tabs">
        <button class="tab active" onclick="openTab(event, 'core')">Núcleo</button>
        <button class="tab" onclick="openTab(event, 'arsenal')">Civitai/HF</button>
        <button class="tab" onclick="openTab(event, 'terror')">Terror</button>
        <button class="tab" onclick="openTab(event, 'factory')">Fábrica</button>
    </div>

    <div class="content">
        <div id="core" class="sector active">
            <div class="grid">
                <button class="btn" onclick="cmd('akame_brain')">🧠 Ativar Jarvis</button>
                <button class="btn" onclick="cmd('akame_status')">📊 Omni Status</button>
            </div>
        </div>
        <div id="arsenal" class="sector">
            <div class="grid">
                <button class="btn" onclick="cmd('akame_civitai')">🌐 Sync Civitai</button>
                <button class="btn" onclick="cmd('lora_injector')">💉 Injetar LoRA</button>
            </div>
        </div>
        <div id="terror" class="sector">
            <div class="grid">
                <button class="btn" style="border-color:#ff003c; color:#ff003c;" onclick="cmd('akame_terror')">💀 EXECUTAR TERROR</button>
            </div>
        </div>
    </div>

    <div class="voice-box" id="status">Sistema Híbrido Online</div>

    <script>
        function openTab(evt, tName) {
            var i, s, t;
            s = document.getElementsByClassName("sector");
            for (i=0; i<s.length; i++) s[i].style.display = "none";
            t = document.getElementsByClassName("tab");
            for (i=0; i<t.length; i++) t[i].className = t[i].className.replace(" active", "");
            document.getElementById(tName).style.display = "block";
            evt.currentTarget.className += " active";
        }
        function cmd(t) { 
            document.getElementById('status').innerText = "Processando " + t + "...";
            fetch('/comando/' + t).then(() => {
                document.getElementById('status').innerText = "Comando " + t + " enviado.";
            });
        }
    </script>
</body>
</html>
